<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>docent — interactive player</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0b0f;
        color: #e8e8ee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
      }
      #root {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        box-sizing: border-box;
      }
      .docent-player-shell {
        width: 100%;
        max-width: 1280px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
      }
      .docent-player-frame {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
        background: #000;
      }
      .docent-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        font-size: 14px;
      }
      .docent-picker a {
        color: #e8e8ee;
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #2a2a35;
        background: #16161d;
      }
      .docent-picker a.active {
        background: #e8e8ee;
        color: #0b0b0f;
        border-color: #e8e8ee;
      }
      .docent-title {
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #8a8a99;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
